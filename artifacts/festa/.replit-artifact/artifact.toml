kind = "web"
previewPath = "/"
title = "Festa"
version = "1.0.0"
id = "artifacts/festa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19174

[services.development]
run = "pnpm --filter @workspace/festa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/festa", "run", "build" ]
publicDir = "artifacts/festa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19174"
BASE_PATH = "/"
